function useOnScreen(ref, threshold = 0.2) {
  const [v, setV] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return v;
}

function FadeIn({ children, delay = 0, style = {} }) {
  const ref = useRef();
  const vis = useOnScreen(ref, 0.12);
  return (<div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(36px)", transition: `all 0.75s cubic-bezier(0.16,1,0.3,1) ${delay}s`, ...style }}>{children}</div>);
}

function StatCard({ number, unit, label, color, delay = 0 }) {
  const ref = useRef();
  const vis = useOnScreen(ref);
  const [count, setCount] = useState(0);
  const num = parseFloat(number.replace(/,/g, ""));
  useEffect(() => {
    if (!vis) return;
    const dur = 1400, start = performance.now();
    function tick(now) {
      const p = Math.min((now - start) / dur, 1);
      setCount((1 - Math.pow(1 - p, 3)) * num);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }, [vis, num]);
  const display = num >= 100 ? Math.round(count).toLocaleString() : count.toFixed(num % 1 !== 0 ? 2 : 0);
  return (
    <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(24px)", transition: `all 0.6s ease ${delay}s`, textAlign: "center", padding: "28px 16px", background: C.white, borderRadius: 16, border: `1px solid ${C.sandDark}66`, boxShadow: "0 2px 16px rgba(12,59,74,0.04)", flex: 1, minWidth: 150 }}>
      <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(1.8rem,4.5vw,2.8rem)", fontWeight: 700, color, lineHeight: 1 }}>
        {display}<span style={{ fontSize: "0.45em", color: C.textMuted, marginLeft: 3 }}>{unit}</span>
      </div>
      <div style={{ fontSize: "0.78rem", color: C.textMuted, marginTop: 10, lineHeight: 1.4 }}>{label}</div>
    </div>
  );
}

function WaveSVG({ flip = false, c1 = C.oceanPale, c2 = C.sand }) {

      <path d="M0,35 C300,10 600,50 900,25 S1300,50 1440,35 L1440,60 L0,60Z" fill={c2} opacity="0.3" />
    </svg>
  );
}

function SunscreenChecker() {
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [scanning, setScanning] = useState(false);
  const banned = ["oxybenzone", "octinoxate", "benzophenone-3", "ethylhexyl methoxycinnamate", "bp-3"];
  const safeList = ["zinc oxide", "titanium dioxide"];
  const sampleProducts = [
    { name: "Mineral Beach SPF 50", ingredients: "Active: Zinc Oxide 22%, Titanium Dioxide 5%. Inactive: Water, Coconut Oil, Shea Butter, Vitamin E" },
    { name: "UltraShield Sport SPF 70", ingredients: "Active: Oxybenzone 6%, Octinoxate 7.5%, Avobenzone 3%. Inactive: Water, Alcohol, Silica" },
    { name: "Daily Glow SPF 30", ingredients: "Active: Zinc Oxide 18%. Inactive: Aloe Vera, Jojoba Oil, Niacinamide, Hyaluronic Acid" },
  ];
  const handleCheck = () => {
    if (!input.trim()) return;
    setScanning(true); setResult(null);
    setTimeout(() => {
      const lower = input.toLowerCase();
      const foundBanned = banned.filter(b => lower.includes(b));
      const foundSafe = safeList.filter(s => lower.includes(s));
      if (foundBanned.length > 0) setResult({ safe: false, chemicals: foundBanned, safeChemicals: foundSafe });
      else if (foundSafe.length > 0) setResult({ safe: true, chemicals: [], safeChemicals: foundSafe });
      else setResult({ safe: null, chemicals: [], safeChemicals: [] });
      setScanning(false);
    }, 1500);
  };

  return (
    <div style={{ maxWidth: 640, margin: "0 auto" }}>
      <div style={{ background: C.white, borderRadius: 20, padding: "36px 32px", border: `1px solid ${C.sandDark}55`, boxShadow: "0 4px 24px rgba(12,59,74,0.06)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: `linear-gradient(135deg, ${C.ocean}, ${C.oceanLight})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem" }}>🔍</div>
          <div>
            <div style={{ fontWeight: 600, color: C.text, fontSize: "0.95rem" }}>Ingredient Scanner</div>
            <div style={{ fontSize: "0.75rem", color: C.textMuted }}>Paste your sunscreen's ingredient list below</div>
          </div>
        </div>
        <textarea value={input} onChange={e => { setInput(e.target.value); setResult(null); }}
          placeholder="e.g. Active Ingredients: Zinc Oxide 22%, Titanium Dioxide 5%..."
          style={{ width: "100%", minHeight: 100, padding: "14px 16px", borderRadius: 12, border: `1.5px solid ${C.sandDark}`, fontFamily: "'DM Sans', sans-serif", fontSize: "0.88rem", color: C.text, background: C.sand+"44", resize: "vertical", boxSizing: "border-box" }}
        />
        <button onClick={handleCheck} disabled={scanning || !input.trim()}
          style={{ marginTop: 14, width: "100%", padding: "14px", borderRadius: 12, border: "none", cursor: input.trim() ? "pointer" : "not-allowed", background: input.trim() ? `linear-gradient(135deg, ${C.ocean}, ${C.lagoon})` : "#ccc", color: C.white, fontWeight: 600, fontSize: "0.92rem", boxShadow: input.trim() ? `0 4px 16px ${C.ocean}33` : "none" }}>
          {scanning ? "⏳ Scanning ingredients..." : "Check Reef Safety"}
        </button>

        {result && (
          <div style={{ marginTop: 18, padding: "18px 20px", borderRadius: 14, background: result.safe === true ? "#E8F8F0" : result.safe === false ? C.reefPale : C.sand+"66", border: `1px solid ${result.safe === true ? C.seagrass+"44" : result.safe === false ? C.reef+"33" : C.sandDark+"44"}`, animation: "fadeUp 0.4s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: "1.4rem" }}>{result.safe === true ? "✅" : result.safe === false ? "⚠️" : "❓"}</span>
              <span style={{ fontWeight: 700, fontSize: "0.95rem", color: result.safe === true ? C.seagrass : result.safe === false ? C.reefDark : C.textMuted }}>
                {result.safe === true ? "Reef Safe!" : result.safe === false ? "Not Reef Safe" : "Insufficient Data"}
              </span>
            </div>
            {result.chemicals.length > 0 && (
              <div style={{ fontSize: "0.82rem", color: C.reefDark, lineHeight: 1.6 }}>
                <strong>Banned chemicals detected:</strong> {result.chemicals.join(", ")}<br/>These ingredients are prohibited under Hawaii SB 2571 due to coral reef and marine ecosystem harm.
              </div>
            )}
            {result.safeChemicals.length > 0 && result.safe === true && (
              <div style={{ fontSize: "0.82rem", color: C.seagrass, lineHeight: 1.6 }}>
                <strong>Mineral active ingredients found:</strong> {result.safeChemicals.join(", ")}<br/>These mineral UV filters are considered safe for coral reefs and marine life.
              </div>
            )}
            {result.safe === null && (
              <div style={{ fontSize: "0.82rem", color: C.textMuted, lineHeight: 1.6 }}>Could not identify known reef-harmful or reef-safe active ingredients. Try pasting the full ingredient list.</div>
            )}
          </div>
        )}

        <div style={{ marginTop: 22, paddingTop: 18, borderTop: `1px solid ${C.sandDark}44` }}>
          <div style={{ fontSize: "0.72rem", color: C.textLight, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Try a sample product</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {sampleProducts.map(p => (
              <button key={p.name} onClick={() => { setInput(p.ingredients); setResult(null); }}
                style={{ padding: "7px 14px", borderRadius: 8, border: `1px solid ${C.sandDark}88`, background: C.sand+"44", fontSize: "0.78rem", color: C.text, cursor: "pointer" }}>

              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ marginTop: 16, padding: "14px 18px", borderRadius: 12, background: C.sand+"66", border: `1px dashed ${C.sandDark}88`, fontSize: "0.78rem", color: C.textMuted, lineHeight: 1.6, textAlign: "center" }}>
        <strong>Future feature:</strong> This checker demonstrates a planned tool that would scan product barcodes or ingredient lists against a comprehensive database of reef-harmful chemicals (oxybenzone, octinoxate, benzophenone-1, 4-methylbenzylidene camphor, and others identified by NOAA). Full implementation would include brand-level lookup and alternative product recommendations.
      </div>
    </div>
  );
}

            <FadeIn delay={0.1}>
              <div style={{ background: C.white, borderRadius: 16, padding: "24px 20px", border: `1px solid ${C.sandDark}55`, boxShadow: "0 2px 12px rgba(0,0,0,0.03)" }}>
                <h4 style={{ color: C.ocean, fontSize: "0.75rem", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Why Consumers Switched</h4>
                <ResponsiveContainer width="100%" height={240}>
                  <BarChart data={consumerData} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.sandDark+"44"} />
                    <XAxis dataKey="name" tick={{ fontSize: 9, fill: C.textMuted }} interval={0} />
                    <YAxis tick={{ fontSize: 9, fill: C.textMuted }} unit="%" />
                    <Tooltip contentStyle={{ background: C.white, border: `1px solid ${C.sandDark}`, borderRadius: 8, fontSize: 12 }} />
                    <Bar dataKey="value" radius={[6,6,0,0]}>
                      {consumerData.map((_,i) => <Cell key={i} fill={[C.ocean,C.reef,C.oceanLight,C.seagrass,C.coral,C.textLight][i]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </FadeIn>
            <FadeIn delay={0.2}>
              <div style={{ background: C.white, borderRadius: 16, padding: "24px 20px", border: `1px solid ${C.sandDark}55`, boxShadow: "0 2px 12px rgba(0,0,0,0.03)" }}>
                <h4 style={{ color: C.reef, fontSize: "0.75rem", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Market Restraints</h4>
                <ResponsiveContainer width="100%" height={240}>
                  <BarChart data={restraintData} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.sandDark+"44"} />
                    <XAxis dataKey="name" tick={{ fontSize: 9, fill: C.textMuted }} interval={0} />
                    <YAxis tick={{ fontSize: 9, fill: C.textMuted }} unit="%" />
                    <Tooltip contentStyle={{ background: C.white, border: `1px solid ${C.sandDark}`, borderRadius: 8, fontSize: 12 }} />
                    <Bar dataKey="value" radius={[6,6,0,0]}>
                      {restraintData.map((_,i) => <Cell key={i} fill={[C.reef,C.coral,C.ocean,C.oceanLight,C.accent][i]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </FadeIn>
          </div>

          <FadeIn delay={0.25}>
            <div style={{ marginTop: 32, background: C.white, borderRadius: 18, padding: "28px", border: `1px solid ${C.sandDark}55`, boxShadow: "0 2px 12px rgba(0,0,0,0.03)" }}>
              <h4 style={{ color: "#B8860B", fontSize: "0.75rem", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>Price per Ounce Comparison</h4>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14 }}>
                {costData.map(item => (
                  <div key={item.type} style={{ padding: "18px", borderRadius: 14, textAlign: "center", background: item.safe ? C.oceanPale+"44" : C.reefPale+"44", border: `1px solid ${item.safe ? C.ocean+"22" : C.reef+"22"}` }}>
                    <div style={{ fontSize: "0.76rem", color: C.textMuted, marginBottom: 6 }}>{item.type}</div>
                    <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "1.8rem", fontWeight: 700, color: item.safe ? C.ocean : C.reef }}>${item.cost.toFixed(2)}</div>
                    <div style={{ fontSize: "0.68rem", color: C.textLight, marginTop: 4 }}>95% CI: ${item.lo.toFixed(2)} – ${item.hi.toFixed(2)}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: "0.7rem", color: C.textLight, marginTop: 14, fontStyle: "italic" }}>Data: Tsatalis et al. (2020), Journal of the American Academy of Dermatology</div>
            </div>
          </FadeIn>
        </section>

        <WaveSVG flip={true} c1={C.sand+"aa"} c2={C.oceanPale+"55"} />

        {/* RECOMMENDATIONS */}
        <section style={{ padding: "70px 24px", maxWidth: 920, margin: "0 auto" }}>
          <FadeIn>
            <div style={{ display: "inline-block", padding: "4px 14px", borderRadius: 6, background: C.seagrass+"18", color: C.seagrass, fontSize: "0.7rem", letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 600, marginBottom: 14 }}>What Comes Next</div>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(1.7rem,4vw,2.8rem)", fontWeight: 700, margin: "0 0 36px", color: C.deep }}>Recommendations</h2>
          </FadeIn>
          {[
            { num: "01", title: 'Standardize "Reef-Safe" Labeling', desc: "Federal agencies should mandate third-party verification of UV efficacy and environmental safety claims — reducing greenwashing and building consumer trust.", color: C.ocean },
            { num: "02", title: "Subsidize Coastal Access", desc: "Tax credits and public health partnerships can bring mineral-based sunscreen costs down for budget-sensitive demographics and low-income coastal communities.", color: C.reef },
            { num: "03", title: "Invest in R&D + Education", desc: "Develop cost-effective, inclusive formulations while communicating the dual health and ecological benefits through schools, beaches, and retailers.", color: C.coral },
            { num: "04", title: "Monitor Long-Term Impact", desc: "Tracking price trends, market share shifts, and reef recovery metrics will inform adaptive policies and demonstrate ecological outcomes.", color: C.seagrass },
          ].map((rec, idx) => (
            <FadeIn key={rec.num} delay={idx*0.08}>
              <div style={{ display: "flex", gap: 20, padding: "24px 22px", marginBottom: 12, background: C.white, borderRadius: 14, border: `1px solid ${C.sandDark}44`, boxShadow: "0 1px 8px rgba(0,0,0,0.02)", alignItems: "flex-start" }}>
                <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "1.8rem", fontWeight: 900, color: rec.color, opacity: 0.55, lineHeight: 1, flexShrink: 0, width: 44 }}>{rec.num}</div>
                <div>
                  <h4 style={{ margin: "0 0 6px", fontSize: "1rem", fontWeight: 600, color: C.text }}>{rec.title}</h4>
                  <p style={{ margin: 0, fontSize: "0.85rem", lineHeight: 1.7, color: C.textMuted }}>{rec.desc}</p>
                </div>
              </div>
            </FadeIn>
          ))}
        </section>

        {/* FOOTER */}
        <section style={{ padding: "48px 24px 36px", textAlign: "center", borderTop: `1px solid ${C.sandDark}55`, marginTop: 20, background: `linear-gradient(180deg, ${C.warmWhite} 0%, ${C.oceanPale}44 100%)` }}>
          <FadeIn>
            <p style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(1rem,2.2vw,1.35rem)", fontWeight: 400, fontStyle: "italic", color: C.ocean, maxWidth: 540, margin: "0 auto 20px", lineHeight: 1.6 }}>
              Every sunscreen purchase is a vote — for your health, for marine ecosystems, and for the kind of market we build.
            </p>
            <p style={{ fontSize: "0.7rem", color: C.textLight, letterSpacing: "0.08em" }}>EHSC · Columbia Mailman School of Public Health · 2026</p>
          </FadeIn>
        </section>
      </React.Fragment>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
